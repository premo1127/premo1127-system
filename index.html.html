
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PREMO1127 HUD – 2 Camera Live</title>
<style>
body {
  margin:0;
  background:#020611;
  font-family:Arial, sans-serif;
  color:white;
}
.top {
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  background:#07101f;
  border-bottom:1px solid #1d3b6b;
}
.title {
  font-weight:bold;
  color:#ff3434;
}
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
  height:calc(100vh - 60px);
}
.cam {
  background:black;
  border:1px solid #1d3b6b;
  border-radius:10px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}
.cam header {
  padding:6px 10px;
  background:#0b1730;
  font-size:12px;
  letter-spacing:2px;
}
.cam iframe {
  flex:1;
  border:0;
}
</style>
</head>

<body>

<div class="top">
<div class="title">PREMO1127 • LIVE CAMERAS</div>
<div id="clock"></div>
</div>

<div class="grid">

<div class="cam">
<header>ARENTI CAM 1</header>
<iframe src="https://192.168.0.7:1984/stream.html?src=cam1"></iframe>
</div>

<div class="cam">
<header>ARENTI CAM 2</header>
<iframe src="https://192.168.0.7:1984/stream.html?src=cam2"></iframe>
</div>

</div>

<script>
function updateClock(){
  const now=new Date();
  document.getElementById("clock").innerText=now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
